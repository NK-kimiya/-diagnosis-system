{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="container p-3">
      <form action="{% url 'logout' %}" method="post" style="display: inline">
        {% csrf_token %}
        <button type="submit" class="btn btn-success">ログアウト</button>
      </form>
    </header>

    <ul class="nav justify-content-center">
      <li class="nav-item">
        <a class="nav-link active" aria-current="page" href="#">医師一覧</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="{% url 'patient_list'%}">患者一覧</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="{% url 'examination_list' %}">検査技師一覧</a>
      </li>
    </ul>
    <h2 class="text-center">Doctors list<br /><span>医師一覧</span></h2>
    <div class="container">
      <table class="table">
        <thead>
          <tr>
            <th scope="col">氏名</th>
            <th scope="col">専門</th>
            <th scope="col">メールアドレス</th>
          </tr>
        </thead>
        <tbody>
          {% for doctor in doctors %}
          <tr>
            <td>{{ doctor.user.username }}</td>
            <td>{{ doctor.specialty }}</td>
            <td>{{ doctor.user.email }}</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
      <a href="{% url 'create_doctor' %}" class="btn btn-success p-2">追加</a>
    </div>
  </body>
</html>
