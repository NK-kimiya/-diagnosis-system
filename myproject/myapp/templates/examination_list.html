{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>検査技師一覧</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="container p-3">
      <form action="{% url 'logout' %}" method="post" style="display: inline">
        {% csrf_token %}
        <button type="submit" class="btn btn-success">ログアウト</button>
      </form>
    </header>
    <nav>
      <ul class="nav justify-content-center">
        <li class="nav-item">
          <a class="nav-link" href="{% url 'patient_list'%}">患者一覧</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{% url 'doctor_list'%}">医師一覧</a>
        </li>
        <li class="nav-item">
          <a class="nav-link active" href="">検査技師一覧</a>
        </li>
      </ul>
    </nav>
    <h2 class="text-center">
      Examination Technicians List<br /><span>検査技師一覧</span>
    </h2>
    <div class="container">
      <table class="table">
        <thead>
          <tr>
            <th>氏名</th>
            <th>専門</th>
            <th>メールアドレス</th>
          </tr>
        </thead>
        <tbody>
          {% for examination in examinations %}
          <tr>
            <td>{{ examination.user.username }}</td>
            <td>{{ examination.specialty }}</td>
            <td>{{ examination.user.email }}</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
      <a href="{% url 'create_examination' %}" class="btn btn-success">追加</a>
    </div>
  </body>
</html>
