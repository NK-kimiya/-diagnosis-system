{% load static %}
<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <title>医師ログイン</title>
    <style>
      input {
        width: 100%;
        padding: 8px;
        margin: 5px 0;
        box-sizing: border-box;
      }
    </style>
  </head>
  <body class="bg-light">
    <div
      class="col-10 col-md-6 mx-auto bg-white p-2 rounded-top shadow m-5 p-5"
    >
      <h2 class="text-center">Doctor Login<br /><span>医師ログイン</span></h2>
      <form method="post">
        {% csrf_token %} {{ form.as_p }}
        <button type="submit" class="btn btn-success">ログイン</button>
      </form>
    </div>
  </body>
</html>
