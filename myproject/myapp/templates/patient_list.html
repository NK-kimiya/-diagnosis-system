{% load static %}
<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>患者一覧</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="container p-3">
      <form action="{% url 'logout' %}" method="post" style="display: inline">
        {% csrf_token %}
        <button type="submit" class="btn btn-success">ログアウト</button>
      </form>
    </header>
    <ul class="nav justify-content-center">
      <li class="nav-item">
        <a class="nav-link active" aria-current="page" href="#">患者一覧</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="{% url 'doctor_list' %}">医師一覧</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="{% url 'examination_list' %}">検査技師一覧</a>
      </li>
    </ul>
    <h2 class="text-center">Patients list<br /><span>患者一覧</span></h2>

    <div class="container">
      <table class="table">
        <thead>
          <tr>
            <th scope="col">氏名</th>
            <th scope="col">カルテID</th>
            <th scope="col">最新の診断結果</th>
            <th scope="col">詳細ページ</th>
          </tr>
        </thead>
        <tbody>
          {% for p in patients %}
          <tr>
            <td>{{ p.name }} 様</td>
            <td>{{ p.chart_id }}</td>
            <td>{{ p.latest_prediction }}</td>
            <td><a href="{% url 'patient_detail' p.pk %}">詳細</a></td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
      <a href="{% url 'create_patient' %}" class="btn btn-success p-2">追加</a>
    </div>
  </body>
</html>
