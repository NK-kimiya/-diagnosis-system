{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      input {
        width: 100%;
        padding: 8px;
        margin: 5px 0;
        box-sizing: border-box;
      }
    </style>
  </head>
  <body class="bg-light">
    <div class="container mt-5 p-5">
      <div class="col-12 col-md-6 mx-auto bg-white p-2 rounded-top shadow p-5">
        <h2 class="text-center">
          Add Examination Technician<br /><span>検査技師追加</span>
        </h2>
        <form method="post">
          {% csrf_token %}
          <label>技師名:</label><br />
          {{ form.username }}<br />

          <label>パスワード:</label><br />
          {{ form.password }}<br />

          <label>メールアドレス:</label><br />
          {{ form.email }}<br />

          <label>検査分野:</label><br />
          {{ form.specialty }}<br />

          <button type="submit" class="btn btn-success">登録</button>
        </form>
      </div>
    </div>
  </body>
</html>
