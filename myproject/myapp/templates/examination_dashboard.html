{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="{% static 'doctor-dashbord.css'%}" />
    <title>検査担当者ダッシュボード</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <style>
    input {
      width: 80%;
      padding: 8px;
      margin: 5px 0;
      box-sizing: border-box;
    }
  </style>
  <body class="container">
    <header class="p-3">
      <form action="{% url 'logout' %}" method="post" style="display: inline">
        {% csrf_token %}
        <button type="submit" class="btn btn-success">ログアウト</button>
      </form>
    </header>
    <h2>{{ examination.user }} 技師</h2>
  </body>

  <form
    action="{% url 'examination_dashboard' %}"
    method="post"
    id="clinical_records_form"
  >
    {% csrf_token %}
    <input
      type="text"
      name="clinical_records"
      placeholder="(カルテ番号)例：123-456-789"
    />
    <button type="submit" class="btn btn-success" style="width: 20%">
      検索
    </button>
  </form>

  {% if patient %}
  <table class="table">
    <tr>
      <th scope="col">氏名</th>
      <th scope="col">カルテID</th>
      <th scope="col">最新の分類結果</th>
      <th scope="col">詳細</th>
    </tr>
    <tr>
      {% for p in patient %}
      <td>名前：{{ p.name }}</td>
      <td>カルテID：{{ p.chart_id }}</td>
      <td>分類：{{ p.latest_prediction|default:"未分類" }}</td>
      <td><a href="{% url 'patient_detail' p.pk %}">詳細</a></td>
      {% endfor %}
    </tr>
  </table>
  {% else %} {% endif %}
</html>
